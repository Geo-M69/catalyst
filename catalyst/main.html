<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalyst - Library</title>
    <script type="module" src="/src/mainPage/mainPage.ts" defer></script>
  </head>

<body class="library-page">
    <div id="library-aspect-shell" class="library-aspect-shell" data-aspect-label="16:9">
    <div id="app-top-hover" class="app-top-hover" aria-hidden="true"></div>
    <main class="launcher-library" aria-label="Game launcher library view">
      <section class="library-column panel-left" aria-label="Library filters">
        <header class="panel-heading-stack">
          <div id="session-account" class="session-account">
            <button
              id="session-account-button"
              class="session-account-button"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="session-account-menu"
            >
              <span id="session-account-label" class="session-account-label">Catalyst</span>
              <span class="session-account-caret" aria-hidden="true"></span>
            </button>
            <div id="session-account-menu" class="session-account-menu" role="menu" hidden>
              <button id="session-account-manage" class="session-account-item" type="button" role="menuitem">
                Manage Accounts
              </button>
              <button id="session-account-signout" class="session-account-item" type="button" role="menuitem">
                Sign Out
              </button>
            </div>
          </div>
          <div class="session-account-divider" aria-hidden="true"></div>
        </header>

        <div id="filter-panel"></div>
        <section id="download-activity" class="download-activity download-activity-sidebar" aria-label="Download activity">
          <div class="download-activity-header">
            <p class="download-activity-title">Downloads</p>
            <span id="download-activity-count" class="download-activity-count" hidden>0</span>
          </div>
          <div id="download-activity-list" class="download-activity-list"></div>
        </section>
      </section>

      <section class="library-column panel-middle" aria-label="Library games grid">
        <header class="panel-heading-library">
          <div class="library-heading-main">
            <div id="library-view-picker" class="library-view-picker" role="tablist" aria-label="Library view">
              <button
                type="button"
                class="library-view-picker-option is-selected"
                role="tab"
                aria-selected="true"
                aria-controls="library-grid"
                tabindex="0"
                data-library-view="games"
              >
                Library
              </button>
              <button
                type="button"
                class="library-view-picker-option"
                role="tab"
                aria-selected="false"
                aria-controls="library-grid"
                tabindex="-1"
                data-library-view="installed"
              >
                Installed
              </button>
              <button
                type="button"
                class="library-view-picker-option"
                role="tab"
                aria-selected="false"
                aria-controls="library-grid"
                tabindex="-1"
                data-library-view="favorites"
              >
                Favorites
              </button>
              <button
                type="button"
                class="library-view-picker-option"
                role="tab"
                aria-selected="false"
                aria-controls="library-grid"
                tabindex="-1"
                data-library-view="collections"
              >
                Collections
              </button>
            </div>
            <div class="library-heading-actions">
              <p id="library-last-updated" class="library-last-updated">Not synced yet</p>
              <button id="refresh-library-button" class="secondary-button refresh-button" type="button">
                <span class="refresh-button-icon" aria-hidden="true"></span>
                <span id="refresh-library-label" class="refresh-button-label">Refresh</span>
              </button>
            </div>
          </div>
          <p id="library-summary" class="status-message library-heading-summary">Loading library...</p>
        </header>

        <div id="library-grid" class="library-grid-scroll" aria-live="polite"></div>
      </section>

      <!-- Game details shell: hidden by default, shown when a game is opened -->
      <section id="game-details-shell" class="library-column panel-details" hidden aria-label="Game details">
        <header class="panel-heading-details">
          <div class="details-hero">
              <div id="details-hero-bg" class="details-hero-bg"></div>
              <div class="details-hero-overlay">
                <button id="game-details-back-button" class="secondary-button" type="button" aria-label="Back">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left-circle"><circle cx="12" cy="12" r="10"></circle><polyline points="12 8 8 12 12 16"></polyline><line x1="16" y1="12" x2="8" y2="12"></line></svg>
                </button>
              </div>
            </div>
            <div id="details-title-row" class="details-title-row details-title-row-below">
              <div id="details-title-info" class="details-title-info">
                <div class="details-play-cell">
                  <button id="details-play-button" class="primary-button">Play</button>
                </div>
              </div>
              <div class="details-action-row">
                <button id="details-settings-button" class="secondary-button" aria-label="Settings" data-tooltip="Settings">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-settings"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button id="details-properties-button" class="secondary-button" aria-label="Details" data-tooltip="Game Details">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-info"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                </button>
                <button id="details-favorite-button" class="secondary-button" aria-label="Favorite" data-tooltip="Add to Favorites">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </button>
              </div>
            </div>
        </header>
        <div id="game-details-content" class="game-details-content">
          <div class="game-details-columns">
            <div class="game-details-main">
              <p class="placeholder">Activity & timeline (placeholder)</p>
            </div>
            <aside class="game-details-side">
              <p class="placeholder">Friends / Achievements (placeholder)</p>
            </aside>
          </div>
        </div>
      </section>

    </main>
    </div>
  </body>
</html>
